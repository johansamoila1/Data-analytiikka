<div class="view-section">
  <mat-card class="analysis-card no-margin-top">
    <mat-card-content>
      <div class="section-header">
        <h3 class="section-title">ROI-jakauma</h3>
        <div class="info-icon-small" title="Histogrammi näyttää elokuvien ROI-jakauman. ROI = (Tuotto - Budjetti) / Budjetti. X-akseli = ROI, Y-akseli = elokuvamäärä.">
          i
        </div>
      </div>
      <p class="section-subtitle">Elokuvien ROI-jakauma histogrammina</p>
      <div class="chart-container" style="height: 40vh">
        <canvas #histogramChart></canvas>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="analysis-card">
    <mat-card-content>
      <div class="section-header">
        <h3 class="section-title">Budjettiluokittelu</h3>
        <div class="info-icon-small" title="Elokuvat jaettu budjetin mukaan kolmeen luokkaan: Indie (<5M$), Mid-budget (5M-50M$), Blockbuster (>50M$). Kunkin luokan mediaani-ROI ja kannattavuusprosentti.">
          i
        </div>
      </div>
      <p class="section-subtitle">Mediaani ROI ja elokuvamäärä budjettiluokittain</p>
      <p class="analysis-mention">
        * Kannattavaksi katsotaan tässä karkeasti elokuvat, joiden ROI on yli 1.0 (eli tuotto on yli kaksinkertainen budjettiin nähden).
      </p>
      <div class="chart-container" style="height: 45vh">
        <canvas #budgetCategoryChart></canvas>
      </div>
    </mat-card-content>
  </mat-card>
</div>
